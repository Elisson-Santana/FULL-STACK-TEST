name: Pipeline teste

on: pull_request

jobs:
  Pipeline-teste:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Using Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.

      - name: Run tests, intall and test
        run: |
          npm install
          npm run build
          npm test